<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        body {
            background: linear-gradient(#8fb0b7, #ffffff)
        }

        .quote {
            color: #ffffff;
            text-shadow:
                0 0 5px rgb(255, 255, 255),
                0 0 15px rgb(255, 255, 255),
                0 0 30px #ffffff;
            overflow: hidden;
            white-space: nowrap;
            animation: typing 3s steps(40);
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid rgb(255, 255, 255);
            box-shadow: 0 0 20px rgb(255, 255, 255);
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }
    </style>
    <title>My Porfolio</title>
</head>

<body>
    <h1 class="quote">"ถ้าฝันแล้ว ก็ต้องทำตามฝัน"</h1>
    <div class="avatar">
        <img src="file:///C:/Users/Administrator/Downloads/67219010063.jpg">
    </div>
</body>

</html>
